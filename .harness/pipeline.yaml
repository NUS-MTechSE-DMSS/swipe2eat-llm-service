pipeline:
  name: SWE5006-llm-service
  identifier: SWE5006llmservice
  projectIdentifier: test
  orgIdentifier: default
  tags: {}

  properties:
    ci:
      codebase:
        connectorRef: account.githubconnector
        repoName: swipe2eat-llm-service
        build:
          type: branch
          spec:
            branch: <+input>

  stages:
    - stage:
        name: Unit Test
        identifier: Unit_Test
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Unit Tests
                  identifier: Run_Tests
                  spec:
                    connectorRef: publicecrconnector
                    image: public.ecr.aws/docker/library/python:3.11-slim
                    imagePullPolicy: IfNotPresent
                    shell: Sh
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: "1"
                    command: |
                      pip install -r requirements.txt pytest pytest-cov --quiet
                      python -m pytest tests/ -v \
                        --cov=app \
                        --cov-report=xml:coverage.xml \
                        --cov-report=term-missing
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - test-results/*.xml

              - step:
                  type: Run
                  name: Run SonarQube Analysis
                  identifier: Run_Sonar
                  spec:
                    connectorRef: publicecrconnector
                    image: sonarsource/sonar-scanner-cli:latest
                    imagePullPolicy: IfNotPresent
                    shell: Sh
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: "1"
                    command: |
                      sonar-scanner \
                        -Dsonar.projectKey=<+pipeline.properties.ci.codebase.repoName> \
                        -Dsonar.organization=nus-mtechse-dmss \
                        -Dsonar.host.url=https://sonarcloud.io \
                        -Dsonar.token=<+secrets.getValue("SONAR_TOKEN")> \
                        -Dsonar.sources=app \
                        -Dsonar.tests=tests \
                        -Dsonar.python.version=3.11 \
                        -Dsonar.python.coverage.reportPaths=coverage.xml

                      echo "--------------------------------------------"
                      echo "SonarCloud Results:"
                      echo "https://sonarcloud.io/project/overview?id=<+pipeline.properties.ci.codebase.repoName>"
                      echo "--------------------------------------------"

    - stage:
        name: Build
        identifier: Build
        template:
          templateRef: CIBackendBuildStageTemplate
          versionLabel: v1
          templateInputs:
            type: CI
            spec:
              execution:
                steps:
                  - step:
                      identifier: Build_Artifact
                      type: Run
                      spec:
                        # Python has no Gradle build step — skip by running a no-op
                        command: echo "Python service — no build artifact step required"
                  - step:
                      identifier: Build_Push
                      type: BuildAndPushECR
                      spec:
                        imageName: swe5006/llm-service

    - stage:
        name: Deployment to Dev
        identifier: Deploy
        template:
          templateRef: CDBackendDeployStageTemplate
          versionLabel: v1
          templateInputs:
            type: Deployment
            spec:
              service:
                serviceRef: llmservice

  variables:
    - name: RUN_GATLING_PERFORMANCE_TEST
      type: String
      value: <+input>.default("false")

    - name: DAST_ZAP_SCAN_SERVICE_PATH
      type: String
      value: <+input>.default("/llm")
