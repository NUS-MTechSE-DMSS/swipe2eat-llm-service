name: CI/CD — LLM Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 282793424364.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: swe5006/llm-service
  ECS_CLUSTER: swe5006-nus-g3-ecs-dev
  ECS_SERVICE: swe5006-nus-g3-llm-dev
  CONTAINER_NAME: llm

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run pytest with coverage
        run: python -m pytest tests/ -v --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  sonar:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: Run SonarCloud SAST
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-deploy:
    name: Build & Deploy
    needs: [test, sonar]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials and login to ECR
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region ${{ env.AWS_REGION }}
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build and push image to ECR
        id: build-image
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        run: |
          IMAGE=${{ steps.build-image.outputs.image }}

          # Get current task definition and inject new image
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition swe5006-nus-g3-llm-dev \
            --query taskDefinition \
            --output json \
            | jq --arg IMAGE "$IMAGE" --arg NAME "$CONTAINER_NAME" \
              '.containerDefinitions |= map(if .name == $NAME then .image = $IMAGE else . end)
               | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition revision
          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update ECS service with new revision
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "$NEW_REVISION"

          # Wait for service to stabilize (max 20 min, poll every 30s)
          echo "Waiting for ECS service to stabilize..."
          for i in $(seq 1 40); do
            STATUS=$(aws ecs describe-services \
              --cluster $ECS_CLUSTER \
              --services $ECS_SERVICE \
              --query 'services[0].deployments[?status==`PRIMARY`].rolloutState' \
              --output text)
            echo "Attempt $i/40 — rollout state: $STATUS"
            if [ "$STATUS" = "COMPLETED" ]; then
              echo "Deployment stabilized successfully."
              break
            fi
            if [ "$STATUS" = "FAILED" ]; then
              echo "Deployment failed!"
              exit 1
            fi
            if [ $i -eq 40 ]; then
              echo "Timed out waiting for stabilization (20 min). Check ECS console."
              exit 1
            fi
            sleep 30
          done
